<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeingInfinity Auto Suggest</title>

    <link rel="stylesheet" href="../css/index.css">
</head>

<body>

    <span class="gear">&#9881;</span>

    <span class="pill">
        <span class="online-dot">&#8226;</span>
        online |
        &#128339; - ms
    </span>

    <div class="main-content">

        <h1>
            <span class="logo">Being</span>Infinity
        </h1>

        <p class="tagline">
            One million phrases. Four Algorithms.
            Prefix Based Auto Suggest.
        </p>

        <div class="search-container">

            <span class="lens">&#128270;</span>

            <input
                id="searchBox"
                class="search-box"
                type="text"
                placeholder="Start typing to search phrases..."
                autocomplete="off"
            >

            <div id="suggestions"></div>

        </div>

    </div>

    <script src="../js/index.js"></script>

</body>

</html>
